name: Release

# Release-please watches main: conventional commits accumulate into a release
# PR (version bump + CHANGELOG); merging that PR creates the tag and the GitHub
# Release. A rib installs from source (`keelson rib add <repo>`), so there are
# no build artifacts to attach — the tag and the generated notes are the whole
# release. (The base keelson repo adds a publish job here because it ships a CLI
# bundle; a rib has nothing to bundle.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # A RELEASE_PLEASE_TOKEN PAT (optional) makes CI run on the release
          # PR; with the default GITHUB_TOKEN the PR gets no workflow runs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
