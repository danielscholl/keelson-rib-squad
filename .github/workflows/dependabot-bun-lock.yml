name: Dependabot bun.lock sync

# Dependabot's npm ecosystem bumps package.json in the root and docs/ projects
# but cannot update Bun's bun.lock, so its PRs fail CI's `bun install
# --frozen-lockfile`. This job regenerates both lockfiles on Dependabot PRs and
# pushes them back onto the branch — automating the manual "bun install + push".

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    name: Sync bun.lock
    # Gate on Dependabot's immutable numeric user id, not the spoofable
    # `github.actor` string (49699333 is the dependabot[bot] account).
    if: github.event.pull_request.user.id == 49699333
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          # A PAT stored as a Dependabot secret lets the lockfile commit
          # re-trigger CI on the new head. Without it the commit still lands,
          # but GITHUB_TOKEN pushes don't start new runs — re-run CI by hand.
          token: ${{ secrets.DEPENDABOT_LOCKFILE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Match ci.yml so the lockfile is generated by the validated runtime.
          bun-version: 1.3.13

      - name: Regenerate lockfiles from the bumped manifests
        run: |
          bun install --lockfile-only
          if [ -f docs/package.json ]; then
            (cd docs && bun install --lockfile-only)
          fi

      - name: Commit & push if a lockfile changed
        run: |
          if git diff --quiet -- bun.lock docs/bun.lock; then
            echo "lockfiles already in sync with package.json — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock docs/bun.lock
          git commit -m "build(deps): sync bun.lock with Dependabot manifest bump"
          git push
